title: browser-session-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

# Demonstrates true browser session continuity — the Playwright context
# stays alive across steps so the page's full state (URL, scroll, JS,
# sessionStorage) is preserved without re-navigation.
#
# Use case shown: two independent browser sessions exchange data via
# capture: / paste_from:, simulating a flow like "fill form → check
# another tab → paste result back" — e.g. copying a verification code
# from an email into a waiting form field.
#
# Step 2 uses session: web with NO actions — the page stays exactly where
# step 1 left it (scrolled, same URL) to prove the context never closed.

pronunciations:
  showtape: "show tape"

steps:
  - id: open-pages
    narration: "Two independent browser sessions open simultaneously. Session web scrolls into the page."
    layout: 3-left
    end_buffer_ms: 1000
    panes:
      - type: browser
        session: web
        actions:
          - goto: "https://github.com/scottrigby/showtape"
          - scroll: { y: 800 }
      - type: browser
        session: docs
        actions:
          - goto: "https://github.com/scottrigby/showtape/blob/main/README.md"
          - capture: { selector: "h1", to: page_title }
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Both browser sessions are now live'"
          - enter: true

  - id: session-persists
    narration: "Session web has no actions this step — no goto, no scroll — yet the page stays exactly where it was."
    layout: 3-left
    end_buffer_ms: 1500
    panes:
      - type: browser
        session: web           # no actions: context alive, page still scrolled to y=800
        actions: []
      - type: browser
        session: docs
        actions:
          - scroll: { y: 400 }
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Pasting page title captured from docs session:'"
          - enter: true
          - sleep_ms: 300
          - type: "echo '"
          - paste_from: page_title
          - type: "'"
          - enter: true

  - id: cross-session-paste-browser
    narration: "The title captured from docs is now pasted into web's search field — cross-session browser data transfer."
    end_buffer_ms: 1500
    panes:
      - type: browser
        session: web
        actions:
          - click: "placeholder=Search or jump to"
          - wait_for: "input[name=query]"
          - fill: { selector: "input[name=query]", paste_from: page_title }
          - sleep_ms: 1000
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Cross-session paste complete'"
          - enter: true
