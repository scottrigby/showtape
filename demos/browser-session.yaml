title: browser-session-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

# Object permanence demo: browser sessions stay alive and exactly where
# you left them, even across steps where they're completely off-screen.
#
# Story:
#   1. Open two browser sessions — GitHub README left, ARCHITECTURE.md right
#   2. Scroll each to an identifiable heading
#   3. Fullscreen terminal — no browser panes at all, sessions running off-screen
#   4. Bring GitHub back (left) + terminal (right): still scrolled. Capture the
#      heading and paste it into the terminal.
#   5. Replace terminal with architecture session (right): still scrolled too.

pronunciations:
  showtape: "show tape"
  ARCHITECTURE: "architecture"

steps:
  - id: open-sessions
    narration: "Two independent browser sessions open simultaneously — the GitHub readme on the left, the architecture docs on the right."
    end_buffer_ms: 1000
    browser_warmup_ms: 1500
    panes:
      - type: browser
        session: github
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: browser
        session: arch
        actions:
          - goto: "https://github.com/scottrigby/showtape/blob/main/ARCHITECTURE.md"

  - id: scroll-to-headings
    narration: "In the GitHub session we scroll to the devcontainer section. In the architecture docs we scroll to the pipeline section."
    end_buffer_ms: 1500
    panes:
      - type: browser
        session: github
        actions:
          - scroll: { y: 650 }   # "Use it as a devcontainer feature" H2
      - type: browser
        session: arch
        actions:
          - scroll: { y: 900 }   # "Pipeline" H2

  - id: terminal-only
    narration: "Both browser sessions are running off-screen. This terminal step has no browser panes at all."
    end_buffer_ms: 2000
    panes:
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Browser sessions are alive in the background'"
          - enter: true
          - sleep_ms: 500
          - type: "echo 'Neither has been touched or reloaded'"
          - enter: true

  - id: github-returns
    narration: "The GitHub session is back on the left — right where we left it. We capture the heading and paste it into the terminal."
    end_buffer_ms: 1500
    panes:
      - type: browser
        session: github               # no goto — still scrolled to devcontainer section
        actions:
          - capture:
              eval: "document.querySelector('.markdown-body h2')?.textContent?.trim()"
              to: section_heading
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Heading captured from GitHub browser session:'"
          - enter: true
          - sleep_ms: 300
          - type: "echo '"
          - paste_from: section_heading
          - type: "'"
          - enter: true

  - id: arch-returns
    narration: "The architecture session comes back on the right. Both sessions are exactly where we left them — no reloads, no re-navigation."
    end_buffer_ms: 2000
    panes:
      - type: browser
        session: github               # still scrolled to devcontainer section
        actions: []
      - type: browser
        session: arch                 # still scrolled to pipeline section
        actions: []
