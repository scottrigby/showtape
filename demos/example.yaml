title: open-source-tts-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

steps:
  - id: intro
    narration: "Welcome! Let me show you Piper, an open source text to speech engine."
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/rhasspy/piper"
      - type: terminal
        actions:
          - type: "# Open-source TTS demo"
          - enter: true
          - sleep_ms: 600
          - type: "uname -srm"
          - enter: true
          - sleep_ms: 1500

  - id: voices
    narration: "Piper ships with hundreds of voices, all hosted on Hugging Face."
    panes:
      - type: browser
        actions:
          - goto: "https://huggingface.co/rhasspy/piper-voices"
      - type: terminal
        actions:
          - type: "# Voices catalog"
          - enter: true
          - sleep_ms: 600
          - type: "echo 'libritts, ljspeech, lessac, kathleen ...'"
          - enter: true
          - sleep_ms: 1500

  - id: install
    narration: "Installation is one pip command. No API keys, no cloud account."
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/rhasspy/piper#installation"
      - type: terminal
        actions:
          - type: "pip --version"
          - enter: true
          - sleep_ms: 1200
          - type: "# pip install piper-tts"
          - enter: true
          - sleep_ms: 1200

  - id: synthesize
    narration: "Synthesizing speech takes a single command. Pipe text in, get audio out."
    panes:
      - type: browser
        actions:
          - goto: "https://huggingface.co/rhasspy/piper-voices/tree/main/en/en_US"
      - type: terminal
        actions:
          - type: "echo 'Hello, world!' | head"
          - enter: true
          - sleep_ms: 1500

  - id: outro
    narration: "Open source, fast, and running entirely on your own hardware. That's Piper."
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/rhasspy/piper"
      - type: terminal
        actions:
          - type: "# Demo complete"
          - enter: true
          - sleep_ms: 500
          - type: "date"
          - enter: true
          - sleep_ms: 1500
