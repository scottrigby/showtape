title: terminal-sessions-demo
resolution: { w: 1920, h: 1080 }
voice: 0

# Demonstrates terminal `session:` continuity, including:
#   - a session that's absent for one step and returns with full scrollback
#   - a session that's resized between steps (multi-dim render)
#
# A session with `session: <id>` shares one shell across every pane that
# declares the same id. Unlike v0.5, sessions can now appear at any pane
# size — the renderer detects all unique sizes for each session and runs
# VHS once per (session, size) pair so each appearance shows correctly-
# wrapped scrollback.

# Pronunciations: A/B test "Shell A" vs "Shell ae" — pick whichever reads
# better and standardise on it. (You can override these from the steps below.)
pronunciations:
  shell-A: "Shell A"      # try this version first
  shell-B: "Shell B"

steps:
  - id: shell-A-first
    narration: "Shell A starts up and runs its first command."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: terminal
        session: shell-A      # 960x540 (3-pane left, small slot)
        actions:
          - type: "echo 'shell-A: command 1'"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B      # 960x540 — kept alive idle so its slot stays continuous
        actions: []

  - id: shell-A-continues
    narration: "Shell ae runs another command. Both commands stay on screen."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://huggingface.co/rhasspy/piper-voices"
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'shell-A: command 2'"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B
        actions: []

  - id: full-screen-browser
    narration: "Now we go full-screen on the browser. Neither shell is visible — but they're both still alive."
    panes:
      - type: browser        # 1-pane fullscreen, 1920x1080
        actions:
          - goto: "https://github.com/charmbracelet/vhs"
      # No shell panes this step. Both sessions are paused, scrollback intact.

  - id: shell-B-runs
    narration: "Back to the split layout. Shell A's history is right where we left it. Now shell B runs a command."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: terminal
        session: shell-A      # 960x540 — same dim as steps 0/1, scrollback unchanged
        actions: []
      - type: terminal
        session: shell-B
        actions:
          - type: "echo 'shell-B: command 1'"
          - enter: true
          - sleep_ms: 1500

  - id: shell-A-fullscreen
    narration: "And shell ae can resize to full screen. All three of its commands are still here, just bigger."
    end_buffer_ms: 500
    panes:
      - type: terminal
        session: shell-A      # 1920x1080 — DIFFERENT dim, second VHS render
        actions:
          - type: "echo 'shell-A: command 3 - bigger now'"
          - enter: true
          - sleep_ms: 1500
