title: terminal-sessions-v2
resolution: { w: 1920, h: 1080 }
voice: 0

# Demonstrates v0.7.0 tmux-backed sessions:
#   - Commands run exactly once (write-op safe).
#   - The same session renders at multiple dims (split-screen + full-screen)
#     without re-executing anything.
#   - A file-creation step proves run-once: /tmp/showtape-v2-demo/ exists
#     with exactly one copy of each created file after the render completes.

pronunciations:
  showtape: "show tape"

steps:
  - id: intro
    narration: "Two terminal sessions, side by side. Each runs in a shared tmux session — commands execute exactly once."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/charmbracelet/vhs"
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'Session A - step 1'"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B
        actions:
          - type: "echo 'Session B - step 1'"
          - enter: true
          - sleep_ms: 1500

  - id: write-ops
    narration: "Now a write operation. This directory is created exactly once, even though the session renders at two different sizes."
    layout: 3-left
    panes:
      - type: browser
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: terminal
        session: shell-A
        actions:
          - type: "mkdir -p /tmp/showtape-v2-demo && touch /tmp/showtape-v2-demo/created-by-A.txt"
          - enter: true
          - sleep_ms: 1000
          - type: "ls /tmp/showtape-v2-demo/"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B
        actions:
          - type: "touch /tmp/showtape-v2-demo/created-by-B.txt"
          - enter: true
          - sleep_ms: 1000
          - type: "ls /tmp/showtape-v2-demo/"
          - enter: true
          - sleep_ms: 1500

  - id: shell-A-fullscreen
    narration: "Shell A goes full screen. All previous output is right here — same session, just bigger. The write op ran once."
    end_buffer_ms: 500
    panes:
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'Same session, full screen. No duplicate side effects.'"
          - enter: true
          - sleep_ms: 2000
