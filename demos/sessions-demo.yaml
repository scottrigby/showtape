title: sessions-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

# Demonstrates cross-pane and cross-step session features:
#   1. Terminal capture + cross-step paste (capture in step 1, reuse in step 3)
#   2. Silent paste into read -s (secret never echoed to screen)
#   3. Browser capture from DOM → paste into terminal
#   4. Terminal capture → paste into browser form field
#
# Note: a `sleep_ms:` before `capture:` is required so the command
# has time to finish before the pane content is snapshotted.

pronunciations:
  showtape: "show tape"

steps:
  - id: generate-token
    narration: "Shell A generates an auth token and captures it. Shell B is live but idle."
    layout: 3-left
    panes:
      - type: browser
        session: web
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: terminal
        session: shell-A
        actions:
          - type: "TOKEN=tk_$(date +%s%3N) && echo $TOKEN"
          - enter: true
          - sleep_ms: 800
          - capture: auth_token    # snapshot — available to any pane in any later step
      - type: terminal
        session: shell-B
        actions: []

  - id: silent-secret
    narration: "Shell B reads the token silently. paste_from types it without echoing — the terminal never shows the value."
    layout: 3-left
    panes:
      - type: browser
        session: web
        actions:
          - goto: "https://github.com/scottrigby/showtape/blob/main/README.md"
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'Token captured, sharing cross-session'"
          - enter: true
          - sleep_ms: 1000
      - type: terminal
        session: shell-B
        actions:
          - type: "read -s TOKEN"     # -s suppresses echo
          - enter: true
          - sleep_ms: 400             # wait for read to be ready
          - paste_from: auth_token    # typed silently — nothing shown on screen
          - enter: true               # complete the read
          - sleep_ms: 300
          - type: "echo Token length is ${#TOKEN} chars"
          - enter: true
          - sleep_ms: 1000

  - id: cross-step-paste
    narration: "Same buffer, three steps later. Shell A uses the token captured back in step one."
    layout: 3-left
    panes:
      - type: browser
        session: web
        actions:
          - goto: "https://github.com/scottrigby/showtape"
      - type: terminal
        session: shell-A
        actions:
          - type: "curl -s -H 'Authorization: Bearer "
          - paste_from: auth_token    # cross-step: buffer from step 1 still live
          - type: "' https://example.com/api"
          - enter: true
          - sleep_ms: 1500
      - type: terminal
        session: shell-B
        actions: []

  - id: browser-to-terminal
    narration: "Browser capture extracts text from the page DOM and pastes it into the terminal."
    layout: 3-left
    panes:
      - type: browser
        session: web
        actions:
          - goto: "https://example.com"
          - capture: { selector: "h1", to: page_heading }   # grabs "Example Domain"
      - type: terminal
        session: shell-A
        actions:
          - type: "echo 'Page says: "
          - paste_from: page_heading
          - type: "'"
          - enter: true
          - sleep_ms: 1000
      - type: terminal
        session: shell-B
        actions: []
