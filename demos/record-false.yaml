title: record-false-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

# Demonstrates record: false with wait_ms — a pure invisible pause.
#
# Story: a countdown runs visibly (1-3), then the recording pauses for
# 10 seconds without showing anything. When it resumes, time.is shows the
# real wall-clock time, making it obvious more time passed than the visible
# footage suggests.

steps:
  - id: start-countdown
    narration: "A countdown starts. The recording will pause invisibly between steps — watch the clock."
    end_buffer_ms: 1000
    browser_warmup_ms: 1500
    panes:
      - type: browser
        session: clock
        actions:
          - goto: "https://time.is/"
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Starting countdown, will pause in-between'"
          - enter: true
          - sleep_ms: 500
          - paste: "for i in {1..3}; do printf 'tick %d  ' $i; sleep 1; done && echo done"
          - enter: true
          - sleep_ms: 4000   # wait for the 3-second loop to finish

  - id: pause
    record: false
    wait_ms: 10000    # 10-second invisible pause — no panes needed

  - id: resume
    narration: "Recording resumes. Check the clock — ten seconds just passed invisibly."
    end_buffer_ms: 2000
    panes:
      - type: browser
        session: clock
        actions:
          - goto: "https://time.is/"   # same page, new time shown
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Back — 10 invisible seconds just elapsed'"
          - enter: true
