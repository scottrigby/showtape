title: record-false-demo
resolution: { w: 1920, h: 1080 }
speaker: 0

# Demonstrates record: false — steps that run actions but never appear
# in the output video.
#
# Story: a countdown runs, then the recording pauses invisibly for several
# seconds, then resumes. The stopwatch in the browser shows the real elapsed
# time, making it obvious more time passed than the visible recording shows.
#
# record: false with wait_ms and no panes is the simplest form:
#   - record: false
#     wait_ms: 5000   ← Python sleeps this long; no panes required

pronunciations:
  vclock: "v clock"

steps:
  - id: start-countdown
    narration: "A countdown starts. We will pause the recording between steps."
    end_buffer_ms: 500
    browser_warmup_ms: 1500
    panes:
      - type: browser
        session: stopwatch
        actions:
          - goto: "https://vclock.com/stopwatch/"
          - click: "text=Start"
          - sleep_ms: 500
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Starting countdown, will pause in-between'"
          - enter: true
          - sleep_ms: 500
          - type: "for i in {1..3}; do printf 'tick %d  ' $i; sleep 1; done && echo"
          - enter: true
          - sleep_ms: 4000   # wait for loop to finish (3 x 1s + margin)

  - id: pause
    record: false
    wait_ms: 5000        # 5-second invisible pause — no panes required
                         # the shell session is idle, the stopwatch keeps running

  - id: resume
    narration: "Recording resumes. The stopwatch shows more time passed than the countdown suggests."
    end_buffer_ms: 1500
    panes:
      - type: browser
        session: stopwatch    # same session — stopwatch still running where we left it
        actions:
          - click: "text=Stop"
          - sleep_ms: 500
      - type: terminal
        session: shell
        actions:
          - type: "echo 'Back — 5 invisible seconds just passed'"
          - enter: true
