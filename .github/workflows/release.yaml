name: Release on version bump

# Triggers when a commit on main changes the version in pyproject.toml or the
# feature manifest. CI verifies the two files agree, tags the commit, and
# publishes the OCI feature to ghcr.io. No GitHub Release is created yet —
# the git tag is the canonical release marker until we have a reason to
# write release notes (see README → Contributing → Cutting a release).
# If the version hasn't actually changed (e.g., a docs-only edit to the file),
# the workflow detects the existing tag and exits as a no-op.
on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - feature/showtape/devcontainer-feature.json
  workflow_dispatch:        # allow manual re-runs from the Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # for `git push <tag>`
      packages: write       # ghcr.io
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # need tags so we can detect "already released"

      - name: Verify all version pins agree
        run: ./scripts/check-version-sync.sh

      - name: Resolve version + skip if already tagged
        id: ver
        run: |
          set -euo pipefail
          PY=$(grep -E '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if git rev-parse "v$PY" >/dev/null 2>&1; then
            echo "v$PY tag already exists — skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=$PY" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      # devcontainers/action runs `devcontainer features publish`, which expects
      # credentials in the runner's docker config. It does NOT auto-login to
      # ghcr.io itself — without this step the publish hits ghcr.io with no
      # auth header and the registry returns 401 UNAUTHORIZED.
      - name: Log in to ghcr.io
        if: steps.ver.outputs.release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The OCI publish writes via `docker login` creds (set above), but the
      # action's post-publish step calls the GitHub REST API (octokit) for
      # repo-tagging / metadata work, and reads its token from the env, NOT
      # from the workflow's `permissions:` block. Without GITHUB_TOKEN in env
      # the post-publish step throws "Parameter token or opts.auth is required"
      # *after* the OCI push has already succeeded.
      - name: Publish devcontainer feature → ghcr.io
        if: steps.ver.outputs.release == 'true'
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./feature"
          features-namespace: scottrigby/showtape
          # Skip the action's auto `feature_<id>_<version>` git tag — we
          # already tag the commit as `v<version>` in the next step, and
          # one canonical release tag is cleaner.
          disable-repo-tagging: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tag is the LAST step — only created if the publish actually succeeded.
      # That way the v<version> tag is unambiguous: "this version is on ghcr.io".
      # Steps after a failure are skipped by default, so a publish failure
      # leaves no tag to short-circuit the retry.
      - name: Tag the released commit
        if: steps.ver.outputs.release == 'true'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
